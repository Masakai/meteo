name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: Lint (flake8)                                                 #
  # Docker不要。ホスト上の仮想環境で高速実行する。                       #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        # 設定はプロジェクトルートの .flake8 を自動参照する。
        # 既存コードの文体ルール (E128, F401 等) は .flake8 で管理済み。
        run: flake8 .

  # ------------------------------------------------------------------ #
  # Job 2: Security scan (bandit)                                        #
  # パストラバーサル対策・認証情報ハードコードを自動検出する。            #
  # ------------------------------------------------------------------ #
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        # B104 (bind all interfaces) は Docker 運用上の意図的な設定のため除外。
        # B310 (urlopen) は go2rtc プロキシの意図的な実装のため除外。
        # B324 (sha1) は ID 生成用途 (非セキュリティ) で変更禁止コアが含まれるため除外。
        # B603/B607 (subprocess without shell) は generate_compose.py で使用している既知のパターン。
        # B608 (SQL injection via f-string) は detection_store.py の query_detections で
        #   WHERE句を固定文字列定数の join で組み立てているため誤検出。ユーザー入力は
        #   パラメータバインド (?) で渡しており実際のインジェクションリスクはない。
        # severity=medium 以上のみ失敗とする。
        run: |
          bandit \
            --recursive \
            --skip B104,B310,B324,B603,B607,B608 \
            --severity-level medium \
            --confidence-level medium \
            --exclude ./.venv,./.claude \
            .

  # ------------------------------------------------------------------ #
  # Job 3: Unit tests (pytest)                                           #
  # コンテナ非依存のテストのみ。pytest.ini の testpaths=tests を使用。   #
  # ------------------------------------------------------------------ #
  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run pytest
        # pytest.ini の testpaths=tests / pythonpath=. を自動で参照する。
        run: pytest -q --tb=short --cov=. --cov-report=term-missing --cov-fail-under=70

  # ------------------------------------------------------------------ #
  # Job 4: Docker build check                                            #
  # 全 Dockerfile をビルドして COPY 漏れ・構文エラーを早期検出する。    #
  # streamers ファイルは .gitignore 対象だが COPY 対象外のため問題なし。 #
  # ビルドのみ（push なし）。fail-fast: false で全 Dockerfile を並列実行。#
  # ------------------------------------------------------------------ #
  docker-build:
    name: Docker build (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            tag: meteor-detector:ci
            # MASK_* ARG にデフォルト値 (mask_none.jpg) があるため build-arg 不要。
          - dockerfile: Dockerfile.dashboard
            tag: meteor-dashboard:ci
          - dockerfile: Dockerfile.reporter
            tag: meteor-reporter:ci
          - dockerfile: Dockerfile.triangulation
            tag: meteor-triangulation:ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.dockerfile }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.tag }}
          # GitHub Actions のレイヤーキャッシュを活用してビルド時間を短縮する。
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}

  # ------------------------------------------------------------------ #
  # Job 5: Dependency audit (pip-audit)                                  #
  # 既知の脆弱性を持つパッケージを検出する。                             #
  # ------------------------------------------------------------------ #
  dep-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt
