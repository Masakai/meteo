{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title ~ ' | ' ~ config.site_name if page and page.title else config.site_name }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url if page and page.canonical_url else config.site_url }}">
  <meta property="og:image" content="{{ config.site_url }}assets/ogp-meteo-card.png">
  <meta property="og:image:secure_url" content="{{ config.site_url }}assets/ogp-meteo-card.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title ~ ' | ' ~ config.site_name if page and page.title else config.site_name }}">
  <meta name="twitter:description" content="{{ config.site_description }}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/ogp-meteo-card.png">
  <script>
    document$.subscribe(function() {
      if (!window.mermaid) return;
      window.mermaid.initialize({
        startOnLoad: true,
        theme: "base",
        themeVariables: {
          primaryColor: "#e2ecff",
          primaryTextColor: "#111111",
          primaryBorderColor: "#7a92bf",
          secondaryColor: "#dff3e2",
          secondaryTextColor: "#111111",
          secondaryBorderColor: "#6f9a79",
          tertiaryColor: "#ffe8cc",
          tertiaryTextColor: "#111111",
          tertiaryBorderColor: "#c28a4a",
          lineColor: "#7b8794",
          textColor: "#111111",
          mainBkg: "#e2ecff",
          nodeBkg: "#e2ecff",
          nodeBorder: "#7a92bf",
          clusterBkg: "#f7f4ff",
          clusterBorder: "#b8abd9",
          defaultLinkColor: "#7b8794",
          titleColor: "#111111",
          edgeLabelBackground: "#ffffff",
          actorBkg: "#e2ecff",
          actorBorder: "#7a92bf",
          actorTextColor: "#111111",
          actorLineColor: "#7b8794",
          signalColor: "#111111",
          signalTextColor: "#111111",
          labelBoxBkgColor: "#fff7e8",
          labelBoxBorderColor: "#c28a4a",
          labelTextColor: "#111111",
          loopTextColor: "#111111",
          noteBkgColor: "#fff7e8",
          noteBorderColor: "#d1b27c",
          noteTextColor: "#111111",
          activationBkgColor: "#efe6ff",
          activationBorderColor: "#ab92cf",
          sectionBkgColor: "#f8fbff",
          altSectionBkgColor: "#fef6ea",
          gridColor: "#d6deea",
          cScale0: "#f8d7da",
          cScale1: "#ffe3c4",
          cScale2: "#fff1bf",
          cScale3: "#dff3e2",
          cScale4: "#e2ecff",
          cScale5: "#efe6ff",
          cScale6: "#f7dff0",
          cScale7: "#dff2f6"
        }
      });
    });
  </script>
{% endblock %}
